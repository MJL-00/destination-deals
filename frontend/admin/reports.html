<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Monthly Reports</title>
    <script src="auth-guard.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f8f9fa; color: #333; }
        .topnav { background: #fff; border-bottom: 2px solid #e9ecef; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .topnav .brand { font-size: 18px; font-weight: 700; color: #343a40; text-decoration: none; }
        .topnav .brand span { color: #007BFF; }
        .topnav .nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
        .topnav .nav-links a { padding: 6px 14px; border-radius: 4px; text-decoration: none; font-size: 14px; font-weight: 600; color: #495057; transition: background 0.15s; }
        .topnav .nav-links a:hover { background: #f1f3f5; }
        .topnav .nav-links a.active { background: #e7f1ff; color: #007BFF; }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; border: none; background: none; }
        .hamburger span { display: block; width: 22px; height: 2px; background: #343a40; border-radius: 2px; }
        .mobile-nav { display: none; flex-direction: column; background: white; border-bottom: 2px solid #e9ecef; padding: 8px 20px 14px; }
        .mobile-nav.open { display: flex; }
        .mobile-nav a { padding: 10px 4px; text-decoration: none; font-size: 14px; font-weight: 600; color: #495057; border-bottom: 1px solid #f1f3f5; }
        .mobile-nav a.active { color: #007BFF; }
        @media (max-width: 950px) { .topnav .nav-links { display: none; } .hamburger { display: flex; } }
        @media (min-width: 951px) { .mobile-nav { display: none !important; } }

        .page { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .page-header h1 { margin: 0; font-size: 24px; color: #343a40; }

        /* Controls */
        .report-controls {
            display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
            background: white; padding: 20px; border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,.07); margin-bottom: 24px;
        }
        .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
        .ctrl-group label { font-size: 11px; font-weight: 700; color: #6c757d; text-transform: uppercase; letter-spacing: 0.05em; }
        .ctrl-group select, .ctrl-group input {
            padding: 8px 12px; border: 1px solid #ced4da; border-radius: 4px;
            font-size: 14px; font-family: inherit;
        }
        .ctrl-group select:focus, .ctrl-group input:focus { border-color: #80bdff; outline: 0; }
        .btn-run { padding: 9px 20px; background: #007BFF; color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; align-self: flex-end; }
        .btn-run:hover { background: #0056b3; }

        /* Business selector */
        .biz-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
        .biz-chip {
            padding: 7px 14px; border-radius: 20px; border: 2px solid #dee2e6;
            background: white; font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.15s; color: #495057;
        }
        .biz-chip:hover { border-color: #007BFF; color: #007BFF; }
        .biz-chip.selected { background: #007BFF; color: white; border-color: #007BFF; }
        .biz-chip.premium { border-color: #ffc107; }
        .biz-chip.premium.selected { background: #ffc107; color: #333; border-color: #ffc107; }

        /* Report card */
        .report-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08); overflow: hidden;
            display: none;
        }
        .report-card.visible { display: block; }

        .report-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #2c6db2 100%);
            color: white; padding: 28px 32px;
        }
        .report-header .biz-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .report-header .report-period { font-size: 14px; opacity: 0.8; }
        .report-header .tier-badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700; margin-top: 8px;
            background: rgba(255,255,255,.2);
        }

        .report-body { padding: 28px 32px; }

        /* Stat blocks */
        .stat-section { margin-bottom: 28px; }
        .stat-section h3 {
            font-size: 11px; font-weight: 700; color: #6c757d;
            text-transform: uppercase; letter-spacing: 0.08em;
            margin: 0 0 14px; padding-bottom: 8px;
            border-bottom: 1px solid #f1f3f5;
        }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
        .stat-box {
            background: #f8f9fa; border-radius: 8px; padding: 16px;
            text-align: center;
        }
        .stat-box .stat-val { font-size: 28px; font-weight: 800; color: #1a1a2e; line-height: 1; }
        .stat-box .stat-lbl { font-size: 12px; color: #6c757d; margin-top: 4px; }

        /* Weekly table */
        .weekly-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .weekly-table th {
            text-align: left; padding: 8px 12px; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.06em; color: #6c757d;
            background: #f8f9fa; border-bottom: 2px solid #e9ecef;
        }
        .weekly-table td { padding: 10px 12px; border-bottom: 1px solid #f1f3f5; }
        .weekly-table tr:last-child td { border-bottom: none; }

        /* Ranking */
        .rank-list { list-style: none; padding: 0; margin: 0; }
        .rank-list li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #f1f3f5; font-size: 13px;
        }
        .rank-list li:last-child { border-bottom: none; }
        .rank-num { font-weight: 700; color: #6c757d; min-width: 28px; }
        .rank-name { flex: 1; }
        .rank-you { font-weight: 700; color: #007BFF; }
        .rank-val { color: #6c757d; font-size: 12px; }

        /* Competitor deals */
        .comp-deal {
            background: #f8f9fa; border-radius: 6px; padding: 10px 14px;
            margin-bottom: 8px; font-size: 13px;
        }
        .comp-deal .comp-biz { font-weight: 700; color: #1a1a2e; }
        .comp-deal .comp-title { color: #495057; }
        .comp-deal .comp-discount { color: #2c6db2; font-weight: 600; float: right; }

        /* Disclaimer */
        .disclaimer {
            background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px;
            padding: 12px 16px; font-size: 12px; color: #856404; margin-top: 20px;
            line-height: 1.6;
        }

        /* Print button */
        .print-bar {
            display: flex; justify-content: flex-end; gap: 10px;
            padding: 16px 32px; border-top: 1px solid #f1f3f5;
            background: #f8f9fa;
        }
        .btn-print { padding: 8px 18px; background: #495057; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-print:hover { background: #343a40; }

        .loading-report { text-align: center; padding: 48px; color: #6c757d; font-size: 15px; }
        .empty-state { text-align: center; padding: 48px; color: #adb5bd; font-size: 14px; }

        @media print {
            .topnav, .mobile-nav, .report-controls, .biz-selector, .print-bar { display: none !important; }
            .report-card { display: block !important; box-shadow: none; }
            body { background: white; }
        }
    </style>
</head>
<body>

    <a class="brand" href="admin-index.html">Destination <span>Deals</span> Admin</a>
    <div class="nav-links">
        <a href="admin-index.html">Dashboard</a>
        <a href="businesses-list.html">Businesses</a>
        <a href="deals-list.html">Deals</a>

        <button onclick="adminLogout()" style="padding:6px 14px;border-radius:4px;border:1px solid #dee2e6;background:white;font-size:14px;font-weight:600;color:#6c757d;cursor:pointer;margin-left:6px;">Logout</button>
    </div>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</nav>

<div class="mobile-nav" id="mobileNav">
    <a href="admin-index.html">Dashboard</a>
    <a href="businesses-list.html">Businesses</a>
    <a href="deals-list.html">Deals</a>
    <a href="add-business.html">+ Add Business</a>
    <a href="add-deal.html">+ Add Deal</a>

</div>

<div class="page">
    <div class="page-header">
        <h1>Monthly Reports</h1>
    </div>

    <!-- Controls -->
    <div class="report-controls">
        <div class="ctrl-group">
            <label>Month</label>
            <select id="monthSelect">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6" selected>June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label>Year</label>
            <input type="number" id="yearInput" value="2026" min="2026" max="2030" style="width:90px;">
        </div>
        <div class="ctrl-group">
            <label>City</label>
            <select id="citySelect">
                <option value="">-- Select City --</option>
            </select>
        </div>
        <button class="btn-run" onclick="loadReport()">Generate Report</button>
    </div>

    <!-- Business selector dropdown -->
        <div id="bizSelectorWrap" style="display:none; margin-bottom:24px;">
            <label style="display:block;font-size:11px;font-weight:700;color:#6c757d;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Select Business</label>
            <select id="bizDropdown" onchange="selectBusiness(parseInt(this.value))"
                style="padding:10px 14px;border:1px solid #ced4da;border-radius:6px;font-size:14px;font-family:inherit;width:100%;max-width:480px;">
                <option value="">-- Choose a business --</option>
            </select>
        </div>

    <!-- Report output -->
    <div class="report-card" id="reportCard">
        <div class="loading-report" id="reportLoading" style="display:none;">Generating report...</div>
        <div id="reportContent"></div>
    </div>
</div>

<script src="../config.js"></script>
<script>
    let allBusinesses = [];
    let selectedBizId = null;
    let reportData    = {};

    function formatTime(t) {
        if (!t) return '';
        const [h, m] = t.split(':').map(Number);
        const ampm = h >= 12 ? 'PM' : 'AM';
        const hour = h % 12 || 12;
        return `${hour}:${String(m).padStart(2,'0')} ${ampm}`;
    }

    function formatDays(dayStr) {
        if (!dayStr) return '';
        const ORDER = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
        const days  = dayStr.split(', ').map(d => d.trim()).filter(Boolean);
        days.sort((a, b) => ORDER.indexOf(a) - ORDER.indexOf(b));
        if (days.length === 7) return 'Everyday';
        if (days.join(',') === 'Monday,Tuesday,Wednesday,Thursday,Friday') return 'Weekdays';
        if (days.join(',') === 'Saturday,Sunday') return 'Weekends';
        // Abbreviate
        const abbr = { Monday:'Mon', Tuesday:'Tue', Wednesday:'Wed',
                        Thursday:'Thu', Friday:'Fri', Saturday:'Sat', Sunday:'Sun' };
        return days.map(d => abbr[d] || d).join(', ');
    }

    const MONTHS = ['','January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    // ── Load cities into dropdown ─────────────────────────────
    async function loadCities() {
        try {
            const res  = await fetch(`${API_URL}/locations`);
            const locs = await res.json();
            const sel  = document.getElementById('citySelect');
            locs.forEach(l => {
                const opt = document.createElement('option');
                opt.value = l.city;
                opt.dataset.state = l.state;
                opt.textContent = `${l.city}, ${l.state}`;
                sel.appendChild(opt);
            });
        } catch(e) { console.error(e); }
    }

    // ── Load businesses for selected city ─────────────────────
    async function loadReport() {
        const city  = document.getElementById('citySelect').value;
        const month = parseInt(document.getElementById('monthSelect').value);
        const year  = parseInt(document.getElementById('yearInput').value);

        if (!city) { alert('Please select a city.'); return; }

        try {
            // Fetch businesses and deals in parallel
            const [bizRes, dealRes] = await Promise.all([
                fetch(`${API_URL}/businesses`),
                fetch(`${API_URL}/deals`)
            ]);
            const all      = await bizRes.json();
            const allDeals = await dealRes.json();

            // Filter businesses by city — field comes from the location join
            allBusinesses = all.filter(b =>
                b.city && b.city.toLowerCase() === city.toLowerCase()
            );

            if (!allBusinesses.length) {
                alert(`No businesses found for ${city}. Check that businesses are linked to this location.`);
                return;
            }

            // Fetch page views — graceful if table doesn't exist yet
            let pageviews = { total_devices: 0, weekly: [] };
            try {
                const pvRes = await fetch(
                    `${API_URL}/pageviews/monthly?city=${encodeURIComponent(city)}&year=${year}&month=${month}`
                );
                if (pvRes.ok) pageviews = await pvRes.json();
            } catch(pvErr) {
                console.warn('Page view data unavailable:', pvErr);
            }

            reportData.pageviews = pageviews;
            reportData.month     = month;
            reportData.year      = year;
            reportData.city      = city;
            reportData.allDeals  = allDeals;

            renderBizChips();
            // Click data is fetched per-business in renderReportCard

        } catch(e) {
            console.error(e);
            alert('Error loading report data. Is the server running?');
        }
    }

    function renderBizChips() {
        const wrap = document.getElementById('bizSelectorWrap');
        const sel  = document.getElementById('bizDropdown');
        wrap.style.display = 'block';
        sel.innerHTML = '<option value="">-- Choose a business --</option>';

        const premium = [...allBusinesses]
            .filter(b => b.subscription_tier === 'Premium')
            .sort((a,b) => a.name.localeCompare(b.name));
        const basic = [...allBusinesses]
            .filter(b => b.subscription_tier !== 'Premium')
            .sort((a,b) => a.name.localeCompare(b.name));

        if (premium.length) {
            const grp = document.createElement('optgroup');
            grp.label = 'Premium Members';
            premium.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.businessid;
                opt.textContent = `★ ${b.name}`;
                grp.appendChild(opt);
            });
            sel.appendChild(grp);
        }

        if (basic.length) {
            const grp = document.createElement('optgroup');
            grp.label = 'Basic Members';
            basic.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.businessid;
                opt.textContent = b.name;
                grp.appendChild(opt);
            });
            sel.appendChild(grp);
        }

        // Leave on placeholder — user must choose a business
        sel.value = '';
    }

    function selectBusiness(id) {
        if (!id) return;
        selectedBizId = id;
        renderReportCard();
    }

    // ── Render the full report card ───────────────────────────
    async function renderReportCard() {
        const biz = allBusinesses.find(b => b.businessid === selectedBizId);
        if (!biz) return;

        const card    = document.getElementById('reportCard');
        const content = document.getElementById('reportContent');
        card.classList.add('visible');

        const month     = reportData.month;
        const year      = reportData.year;
        const monthName = MONTHS[month];
        const pv        = reportData.pageviews;
        const allDeals  = reportData.allDeals || [];

        // City-level page views
        const totalDevices = pv?.total_devices || 0;
        const weeklyRows   = pv?.weekly || [];

        // Fetch monthly click breakdown for this business AND all city businesses
        let clickData     = { weekly: [], totals: [] };
        let cityClickData = [];
        try {
            const [cRes, cityRes] = await Promise.all([
                fetch(`${API_URL}/pageviews/clicks?businessid=${selectedBizId}&year=${reportData.year}&month=${reportData.month}`),
                fetch(`${API_URL}/pageviews/city-clicks?city=${encodeURIComponent(reportData.city)}&year=${reportData.year}&month=${reportData.month}`)
            ]);
            if (cRes.ok)    clickData     = await cRes.json();
            if (cityRes.ok) cityClickData = await cityRes.json();
        } catch(e) { console.warn('click data unavailable'); }

        // Build a monthly click lookup map: businessid → total_clicks
        const monthlyClickMap = {};
        cityClickData.forEach(r => {
            monthlyClickMap[r.businessid] = parseInt(r.total_clicks) || 0;
        });

        // Monthly totals from timestamped data
        const monthlyWebsite    = clickData.totals.find(t => t.click_type === 'website')?.total || 0;
        const monthlyDirections = clickData.totals.find(t => t.click_type === 'directions')?.total || 0;

        // Fall back to cumulative if no monthly data yet
        const websiteClicks    = parseInt(monthlyWebsite)    || biz.website_click_count    || 0;
        const directionsClicks = parseInt(monthlyDirections) || biz.directions_click_count || 0;
        const hasMonthlyData   = parseInt(monthlyWebsite) > 0 || parseInt(monthlyDirections) > 0;

        // Get this business's categories from allDeals
        const myDeals      = allDeals.filter(d => d.businessid === selectedBizId);
        const myCategories = [...new Set(
            myDeals.flatMap(d => (d.categories || '').split(', ').map(c => c.trim()).filter(Boolean))
        )];

        // Build a businessid → business name map from allBusinesses for competitor lookup
        const bizMap = {};
        allBusinesses.forEach(b => { bizMap[b.businessid] = b; });

        // City ranking — sorted by MONTHLY clicks from business_click table
        const getMonthlyClicks = b => monthlyClickMap[b.businessid] || 0;

        const ranked = [...allBusinesses].sort((a, b) =>
            getMonthlyClicks(b) - getMonthlyClicks(a)
        );
        const myRankCity  = ranked.findIndex(b => b.businessid === selectedBizId) + 1;
        const totalInCity = ranked.length;

        // Category ranking — businesses sharing at least one category, monthly clicks
        const categoryPeers = allBusinesses.filter(b => {
            if (b.businessid === selectedBizId) return false;
            const bDeals = allDeals.filter(d => d.businessid === b.businessid);
            const bCats  = bDeals.flatMap(d => (d.categories || '').split(', ').map(c => c.trim()).filter(Boolean));
            return myCategories.some(cat => bCats.includes(cat));
        });
        const rankedCat = [...categoryPeers, biz].sort((a, b) =>
            getMonthlyClicks(b) - getMonthlyClicks(a)
        );
        const myRankCat  = rankedCat.findIndex(b => b.businessid === selectedBizId) + 1;
        const totalInCat = rankedCat.length;

        // Competitor deals — businesses sharing at least one category (using allDeals which has business_name)
        const peerIds = new Set(categoryPeers.map(b => b.businessid));
        const compDeals = allDeals
            .filter(d => peerIds.has(d.businessid))
            .slice(0, 10);

        // Format weekly breakdown
        const weeklyHTML = weeklyRows.length
            ? `<table class="weekly-table">
                <thead>
                    <tr>
                        <th>Week</th>
                        <th>Unique Devices</th>
                    </tr>
                </thead>
                <tbody>
                    ${weeklyRows.map((w, i) => `
                        <tr>
                            <td>Week ${i+1} (${new Date(w.week_start).toLocaleDateString('en-US',{month:'short',day:'numeric'})})</td>
                            <td>${w.weekly_devices}</td>
                        </tr>`).join('')}
                </tbody>
               </table>`
            : `<p style="color:#adb5bd;font-size:13px;">No page view data recorded yet for this period.</p>`;

        // Ranking list
        const rankHTML = ranked.slice(0, 8).map((b, i) => {
            const isYou        = b.businessid === selectedBizId;
            const monthClicks  = getMonthlyClicks(b);
            return `<li>
                <span class="rank-num">#${i+1}</span>
                <span class="rank-name ${isYou ? 'rank-you' : ''}">${b.name}${isYou ? ' ← You' : ''}</span>
                <span class="rank-val">${monthClicks} interactions this month</span>
            </li>`;
        }).join('');

        // Competitor deals HTML
        const compHTML = compDeals.length
            ? compDeals.map(d => {
                // Use business_name from allDeals (already joined server-side)
                // Fall back to bizMap lookup if needed
                const bizName = d.business_name || bizMap[d.businessid]?.name || '—';
                const discount = d.discountvalue && d.discountvalue > 0
                    ? (d.discounttype === 'Percent' ? `${parseFloat(d.discountvalue)}% off` : `$${parseFloat(d.discountvalue)} off`)
                    : d.discounttype || '';
                // Format schedule with proper day ordering
                const start    = d.starttime ? d.starttime.slice(0,5) : '';
                const end      = d.endtime   ? d.endtime.slice(0,5)   : '';
                const timeStr  = start && end ? ` · ${formatTime(start)} – ${formatTime(end)}` : '';
                const schedule = d.days ? `${formatDays(d.days)}${timeStr}` : '';

                return `<div class="comp-deal">
                    <span class="comp-biz">${bizName}</span>
                    <span class="comp-discount">${discount}</span>
                    <br><span class="comp-title">${d.title}</span>
                    ${schedule ? `<br><span style="font-size:11px;color:#6c757d;">${schedule}</span>` : ''}
                </div>`;
            }).join('')
            : '<p style="color:#adb5bd;font-size:13px;">No competitor deals found in your category.</p>';

        content.innerHTML = `
            <div class="report-header">
                <div class="biz-name">${biz.name}</div>
                <div class="report-period">${monthName} ${year} Performance Report</div>
                <div class="tier-badge">${biz.subscription_tier} Member</div>
            </div>
            <div class="report-body">

                <div class="stat-section">
                    <h3>City-Wide Reach — ${reportData.city}</h3>
                    <div class="stat-grid">
                        <div class="stat-box">
                            <div class="stat-val">${totalDevices.toLocaleString()}</div>
                            <div class="stat-lbl">Unique Visitors to ${reportData.city} Page</div>
                        </div>
                    </div>
                    <div style="margin-top:16px;">${weeklyHTML}</div>
                </div>

                <div class="stat-section">
                    <h3>Your Engagement — ${monthName} ${year}</h3>
                    <p style="font-size:12px;color:#adb5bd;margin-bottom:12px;">
                        ${hasMonthlyData ? 'Monthly digital engagement totals.' : 'No engagement recorded this month yet. Showing cumulative totals.'}
                    </p>
                    <div class="stat-grid">
                        <div class="stat-box">
                            <div class="stat-val">${websiteClicks}</div>
                            <div class="stat-lbl">Website Interactions</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-val">${directionsClicks}</div>
                            <div class="stat-lbl">Directions Interactions</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-val">${parseInt(websiteClicks) + parseInt(directionsClicks)}</div>
                            <div class="stat-lbl">Total Interactions</div>
                        </div>
                    </div>
                    ${clickData.weekly.length ? `
                    <div style="margin-top:16px;">
                        <table class="weekly-table">
                            <thead>
                                <tr>
                                    <th>Week</th>
                                    <th>Website Clicks</th>
                                    <th>Directions Clicks</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${(() => {
                                    // Group weekly rows by week_start
                                    const weeks = {};
                                    clickData.weekly.forEach(r => {
                                        const w = r.week_start;
                                        if (!weeks[w]) weeks[w] = { website: 0, directions: 0 };
                                        weeks[w][r.click_type] = parseInt(r.clicks);
                                    });
                                    return Object.entries(weeks).map(([wk, counts], i) => {
                                        const d = new Date(wk);
                                        const label = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
                                        const total = counts.website + counts.directions;
                                        return `<tr>
                                            <td>Week ${i+1} (${label})</td>
                                            <td>${counts.website}</td>
                                            <td>${counts.directions}</td>
                                            <td><strong>${total}</strong></td>
                                        </tr>`;
                                    }).join('');
                                })()}
                            </tbody>
                        </table>
                    </div>` : ''}
                </div>

                <div class="stat-section">
                    <h3>Your Ranking in ${reportData.city} — All Businesses</h3>
                    <p style="font-size:13px;color:#6c757d;margin-bottom:12px;">
                        Ranked #${myRankCity} of ${totalInCity} businesses by digital interactions in ${monthName} ${year}.
                    </p>
                    <ul class="rank-list">${rankHTML}</ul>
                </div>

                <div class="stat-section">
                    <h3>Your Ranking in Your Category</h3>
                    <p style="font-size:13px;color:#6c757d;margin-bottom:12px;">
                        Ranked #${myRankCat} of ${totalInCat} businesses in your category (${myCategories.join(', ') || '—'}).
                    </p>
                    <ul class="rank-list">${rankedCat.slice(0,8).map((b,i) => {
                        const isYou       = b.businessid === selectedBizId;
                        const monthClicks = getMonthlyClicks(b);
                        return `<li>
                            <span class="rank-num">#${i+1}</span>
                            <span class="rank-name ${isYou ? 'rank-you' : ''}">${b.name}${isYou ? ' ← You' : ''}</span>
                            <span class="rank-val">${monthClicks} interactions this month</span>
                        </li>`;
                    }).join('')}</ul>
                </div>

                <div class="stat-section">
                    <h3>Competitor Deals in ${reportData.city}</h3>
                    <p style="font-size:13px;color:#6c757d;margin-bottom:12px;">
                        Businesses sharing your category in ${reportData.city}. Use this to strategically position your deals.
                        ${myCategories.length ? `<br><strong>Your categories:</strong> ${myCategories.join(', ')}` : ''}
                    </p>
                    ${compHTML}
                </div>

                <div class="disclaimer">
                    <strong>Note:</strong> Unique visitor counts include all devices that accessed your city's page.
                    Engagement figures reflect new and returning visitors who interacted with your listing.
                    Locals who already know your location may visit without generating additional interactions.
                </div>

            </div>
            <div class="print-bar">
                <button class="btn-print" onclick="window.print()">Print / Save as PDF</button>
            </div>`;
    }

    document.getElementById('hamburgerBtn').addEventListener('click', function() {
        document.getElementById('mobileNav').classList.toggle('open');
    });

    // Set current month
    const now = new Date();
    document.getElementById('monthSelect').value = now.getMonth() + 1;
    document.getElementById('yearInput').value   = now.getFullYear();

    loadCities();
</script>
</body>
</html>
