<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Deal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f8f9fa; color: #333; }
        .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #28a745; border-bottom: 2px solid #e9ecef; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
        input:focus, select:focus, textarea:focus { border-color: #85d7a7; outline: 0; box-shadow: 0 0 0 0.2rem rgba(40,167,69,.25); }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f1f3f5; padding: 15px; border-radius: 4px; border: 1px solid #dee2e6; }
        .checkbox-item { display: flex; align-items: center; font-size: 14px; }
        .checkbox-item input { width: auto; margin-right: 8px; }
        .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: #218838; }
        .message { margin-top: 20px; padding: 12px; border-radius: 4px; display: none; font-size: 14px; font-weight: 500; }
        .nav-links { margin-top: 20px; text-align: center; display: flex; justify-content: center; gap: 20px; }
        .nav-links a { color: #6c757d; text-decoration: none; font-size: 14px; }
        .nav-links a:hover { text-decoration: underline; }

        /* Limited time offer section */
        .lto-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .lto-toggle input[type="checkbox"] {
            width: auto;
            margin: 0;
            accent-color: #28a745;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .lto-toggle label {
            margin: 0;
            font-weight: 600;
            font-size: 14px;
            color: #333;
            cursor: pointer;
        }
        .lto-toggle .lto-hint {
            font-size: 12px;
            color: #6c757d;
            font-weight: 400;
            margin-left: 4px;
        }
        .lto-dates {
            display: none;
            background: #f0faf2;
            border: 1px solid #c3e6cb;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .lto-dates.active { display: block; }
        .lto-dates .time-row { margin-bottom: 0; }
        .lto-dates input[type="date"] {
            border-color: #c3e6cb;
        }
        .lto-dates input[type="date"]:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40,167,69,.25);
        }
        .lto-dates label { color: #155724; }

        /* ── Top nav bar ── */
        .topnav { background: #fff; border-bottom: 2px solid #e9ecef; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 56px; flex-shrink: 0; }
        .topnav .brand { font-size: 18px; font-weight: 700; color: #343a40; text-decoration: none; }
        .topnav .brand span { color: #007BFF; }
        .topnav .nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
        .topnav .nav-links a { padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: 600; color: #495057; transition: background 0.15s; }
        .topnav .nav-links a:hover { background: #f1f3f5; }
        .topnav .nav-links a.active { background: #e7f1ff; color: #007BFF; }
    </style>
</head>
<body>

<nav class="topnav">
    <a class="brand" href="admin-index.html">Destination <span>Deals</span> Admin</a>
    <div class="nav-links">
        <a href="admin-index.html">Dashboard</a>
        <a href="businesses-list.html">Businesses</a>
        <a href="deals-list.html">Deals</a>
        <a href="add-business.html">+ Add Business</a>
        <a href="add-deal.html" class="active">+ Add Deal</a>
        <a href="crm.html">CRM</a>
    </div>
</nav>

    <div class="container">
        <h2>Add New Deal</h2>
        <form id="dealForm">
            <div class="form-group">
                <label>Search & Select Business *</label>
                <input type="text" id="businessSearch" list="businessDataList" placeholder="Type business name..." required>
                <datalist id="businessDataList"></datalist>
            </div>
            <div class="form-group">
                <label>Deal Title *</label>
                <input type="text" id="title" maxlength="150" required placeholder="e.g., Half Off Appetizers">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="3" maxlength="255" placeholder="Details regarding constraints..."></textarea>
            </div>
            <div class="form-group">
                <label>Assign Categories</label>
                <div id="categoryCheckboxes" class="checkbox-group">Loading categories...</div>
            </div>
            <div class="form-group">
                <label>Active Days (Schedule) *</label>
                <div style="margin-bottom: 8px;">
                    <label style="display:inline-flex; align-items:center; gap:6px; font-weight:600; font-size:13px; color:#495057; cursor:pointer;">
                        <input type="checkbox" id="selectAllDays" style="width:auto; margin:0;">
                        Select All / Deselect All
                    </label>
                </div>
                <div class="checkbox-group" id="dayCheckboxes">
                    <div class="checkbox-item"><input type="checkbox" name="days" value="Monday"    id="day_mon"><label for="day_mon"> Monday</label></div>
                    <div class="checkbox-item"><input type="checkbox" name="days" value="Tuesday"   id="day_tue"><label for="day_tue"> Tuesday</label></div>
                    <div class="checkbox-item"><input type="checkbox" name="days" value="Wednesday" id="day_wed"><label for="day_wed"> Wednesday</label></div>
                    <div class="checkbox-item"><input type="checkbox" name="days" value="Thursday"  id="day_thu"><label for="day_thu"> Thursday</label></div>
                    <div class="checkbox-item"><input type="checkbox" name="days" value="Friday"    id="day_fri"><label for="day_fri"> Friday</label></div>
                    <div class="checkbox-item"><input type="checkbox" name="days" value="Saturday"  id="day_sat"><label for="day_sat"> Saturday</label></div>
                    <div class="checkbox-item"><input type="checkbox" name="days" value="Sunday"    id="day_sun"><label for="day_sun"> Sunday</label></div>
                </div>
            </div>
            <div class="time-row">
                <div class="form-group">
                    <label>Start Time *</label>
                    <input type="time" id="starttime" step="1800" value="09:00" required>
                </div>
                <div class="form-group">
                    <label>End Time *</label>
                    <input type="time" id="endtime" step="1800" value="21:00" required>
                </div>
            </div>
            <div class="form-group">
                <label>Discount Type *</label>
                <select id="discounttype" required>
                    <option value="">-- Select Type --</option>
                    <option value="Percent">Percent (% Off)</option>
                    <option value="Flat">Flat ($ Off)</option>
                    <option value="BOGO">BOGO (Buy One, Get One)</option>
                    <option value="Custom">Custom / Special Promo</option>
                </select>
            </div>
            <div class="form-group">
                <label>Discount Value (Optional)</label>
                <input type="number" id="discountvalue" step="0.01" placeholder="e.g., 15.00">
            </div>

            <!-- Limited Time Offer toggle -->
            <div class="lto-toggle" onclick="toggleLTO()">
                <input type="checkbox" id="isLimitedTime">
                <label for="isLimitedTime">
                    Limited Time Offer
                    <span class="lto-hint">— set a go live date, expiry date, or both</span>
                </label>
            </div>

            <!-- Date range — hidden until checkbox is ticked -->
            <div class="lto-dates" id="ltoDates">
                <div class="time-row">
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Go Live Date</label>
                        <input type="date" id="startdate" disabled>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Expiry Date</label>
                        <input type="date" id="enddate" disabled>
                    </div>
                </div>
            </div>

            <button type="submit">Save Deal</button>
        </form>

        <div id="msgBox" class="message"></div>
        <div class="nav-links">
            <a href="admin-index.html">← Dashboard</a>
            <a href="add-business.html">← Add a Business</a>
            <a href="deals-list.html">→ View All Deals</a>
        </div>
    </div>

    <script src="../config.js"></script>
    <script>
        let businessMap = {};

        // ── Limited Time Offer toggle ─────────────────────────────
        function toggleLTO() {
            const checkbox  = document.getElementById('isLimitedTime');
            const dateBlock = document.getElementById('ltoDates');
            const startdate = document.getElementById('startdate');
            const enddate   = document.getElementById('enddate');

            // Flip checkbox state (since the div onclick fires before the checkbox)
            checkbox.checked = !checkbox.checked;

            if (checkbox.checked) {
                dateBlock.classList.add('active');
                startdate.disabled = false;
                enddate.disabled   = false;
            } else {
                dateBlock.classList.remove('active');
                startdate.disabled = true;
                enddate.disabled   = true;
                startdate.value    = '';
                enddate.value      = '';
            }
        }

        // Prevent the div onclick from double-firing when clicking the checkbox directly
        document.getElementById('isLimitedTime').addEventListener('click', function(e) {
            e.stopPropagation();
            const dateBlock = document.getElementById('ltoDates');
            const startdate = document.getElementById('startdate');
            const enddate   = document.getElementById('enddate');
            if (this.checked) {
                dateBlock.classList.add('active');
                startdate.disabled = false;
                enddate.disabled   = false;
            } else {
                dateBlock.classList.remove('active');
                startdate.disabled = true;
                enddate.disabled   = true;
                startdate.value    = '';
                enddate.value      = '';
            }
        });

        // ── Load form assets ──────────────────────────────────────
        async function initPageData() {
            try {
                const bizRes = await fetch(`${API_URL}/businesses/lookup`);
                const businesses = await bizRes.json();
                const datalist = document.getElementById('businessDataList');
                datalist.innerHTML = '';
                businessMap = {};
                businesses.forEach(b => {
                    const option = document.createElement('option');
                    option.value = b.name;
                    datalist.appendChild(option);
                    businessMap[b.name] = b.businessid;
                });

                const catRes = await fetch(`${API_URL}/categories/lookup`);
                const categories = await catRes.json();
                const checkboxContainer = document.getElementById('categoryCheckboxes');
                checkboxContainer.innerHTML = '';
                categories.forEach(c => {
                    const wrap = document.createElement('div');
                    wrap.className = 'checkbox-item';
                    wrap.innerHTML = `<input type="checkbox" name="categories" value="${c.categoryid}" id="cat_${c.categoryid}">
                                      <label for="cat_${c.categoryid}" style="display:inline; font-weight:normal;"> ${c.categoryname}</label>`;
                    checkboxContainer.appendChild(wrap);
                });
            } catch (err) {
                console.error(err);
            }
        }

        // ── Submit ────────────────────────────────────────────────
        document.getElementById('dealForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('msgBox');
            msgBox.style.display = 'none';

            const typedName  = document.getElementById('businessSearch').value;
            const verifiedId = businessMap[typedName];

            if (!verifiedId) {
                msgBox.style.cssText = 'display:block; background:#f8d7da; color:#721c24; border:1px solid #f5c6cb;';
                msgBox.innerText = "Error: Select a valid business from the dropdown suggestions.";
                return;
            }

            const checkedBoxes = document.querySelectorAll('input[name="categories"]:checked');
            const categoryIds  = Array.from(checkedBoxes).map(cb => parseInt(cb.value));

            const checkedDays = document.querySelectorAll('input[name="days"]:checked');
            const activeDays  = Array.from(checkedDays).map(cb => cb.value);

            if (activeDays.length === 0) {
                msgBox.style.cssText = 'display:block; background:#f8d7da; color:#721c24; border:1px solid #f5c6cb;';
                msgBox.innerText = "Error: Please select at least one active day for this deal.";
                return;
            }

            const isLimited = document.getElementById('isLimitedTime').checked;
            const startdate = document.getElementById('startdate').value || null;
            const enddate   = document.getElementById('enddate').value   || null;

            // Validate dates if limited time is checked
            if (isLimited) {
                if (!startdate || !enddate) {
                    msgBox.style.cssText = 'display:block; background:#f8d7da; color:#721c24; border:1px solid #f5c6cb;';
                    msgBox.innerText = "Error: Please enter both a start and end date for the limited time offer.";
                    return;
                }
                if (new Date(enddate) <= new Date(startdate)) {
                    msgBox.style.cssText = 'display:block; background:#f8d7da; color:#721c24; border:1px solid #f5c6cb;';
                    msgBox.innerText = "Error: End date must be after start date.";
                    return;
                }
            }

            const payload = {
                businessid:    verifiedId,
                title:         document.getElementById('title').value,
                description:   document.getElementById('description').value || null,
                discounttype:  document.getElementById('discounttype').value,
                discountvalue: document.getElementById('discountvalue').value
                    ? parseFloat(document.getElementById('discountvalue').value)
                    : null,
                isactive:      true,
                categoryIds:   categoryIds,
                activeDays:    activeDays,
                starttime:     document.getElementById('starttime').value || null,
                endtime:       document.getElementById('endtime').value   || null,
                startdate:     isLimited ? startdate : null,
                enddate:       isLimited ? enddate   : null
            };

            try {
                const response = await fetch(`${API_URL}/deals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (response.ok) {
                    msgBox.style.cssText = 'display:block; background:#d4edda; color:#155724; border:1px solid #c3e6cb;';
                    msgBox.innerText = data.message;
                    document.getElementById('dealForm').reset();
                    // Reset LTO section manually since reset() won't re-disable the dates
                    document.getElementById('ltoDates').classList.remove('active');
                    document.getElementById('startdate').disabled = true;
                    document.getElementById('enddate').disabled   = true;
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                msgBox.style.cssText = 'display:block; background:#f8d7da; color:#721c24; border:1px solid #f5c6cb;';
                msgBox.innerText = err.message;
            }
        });

        initPageData();

        // ── Select All / Deselect All days ────────────────────────
        document.getElementById('selectAllDays').addEventListener('change', function() {
            document.querySelectorAll('input[name="days"]').forEach(cb => cb.checked = this.checked);
        });

        document.getElementById('dayCheckboxes').addEventListener('change', function(e) {
            if (e.target.name === 'days') {
                const dayBoxes  = document.querySelectorAll('input[name="days"]');
                const allChecked = [...dayBoxes].every(cb => cb.checked);
                document.getElementById('selectAllDays').checked = allChecked;
            }
        });
    </script>
</body>
</html>
