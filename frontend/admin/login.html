<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Destination Deals</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.10);
            padding: 48px 40px;
            width: 100%;
            max-width: 380px;
        }
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand h1 {
            font-size: 20px;
            font-weight: 800;
            color: #343a40;
        }
        .brand h1 span { color: #007BFF; }
        .brand p {
            font-size: 13px;
            color: #6c757d;
            margin-top: 4px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            letter-spacing: 0.08em;
            transition: border-color 0.15s;
        }
        .form-group input:focus {
            border-color: #007BFF;
            outline: 0;
            box-shadow: 0 0 0 3px rgba(0,123,255,.12);
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: #0056b3; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            background: #fde8e8;
            color: #b02a2a;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <h1>Destination <span>Deals</span></h1>
            <p>Admin Access</p>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                id="passwordInput"
                placeholder="Enter admin password"
                autocomplete="current-password"
                onkeydown="if(event.key==='Enter') submitLogin()">
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitLogin()">
            Sign In
        </button>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <script src="../config.js"></script>
    <script>
        // If already authenticated, go straight to dashboard
        if (sessionStorage.getItem('dd_admin_token')) {
            window.location.href = 'admin-index.html';
        }

        async function submitLogin() {
            const password = document.getElementById('passwordInput').value;
            const btn      = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            if (!password) {
                showError('Please enter the admin password.');
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Signing in...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (res.ok && data.token) {
                    sessionStorage.setItem('dd_admin_token', data.token);
                    window.location.href = 'admin-index.html';
                } else {
                    showError(data.error || 'Incorrect password.');
                }
            } catch (e) {
                showError('Could not reach server. Is it running?');
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Sign In';
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent   = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
