<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Businesses</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f8f9fa; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #007BFF; border-bottom: 2px solid #e9ecef; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
        input:focus, select:focus { border-color: #80bdff; outline: 0; box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25); }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f1f3f5; padding: 15px; border-radius: 4px; border: 1px solid #dee2e6; max-height: 150px; overflow-y: auto; }
        .checkbox-item { display: flex; align-items: center; font-size: 14px; }
        .checkbox-item input { width: auto; margin-right: 8px; }
        button { width: 100%; padding: 12px; background-color: #007BFF; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: #0056b3; }
        .message { margin-top: 20px; padding: 12px; border-radius: 4px; display: none; font-size: 14px; font-weight: 500; }
        .nav-links { margin-top: 20px; text-align: center; display: flex; justify-content: center; gap: 20px; }
        .nav-links a { color: #6c757d; text-decoration: none; font-size: 14px; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Add New Storefront Business</h2>
        <form id="businessForm">
            <div class="form-group">
                <label>Business Name *</label>
                <input type="text" id="name" maxlength="150" required placeholder="e.g., Midtown Oyster Bar - Newport">
            </div>
            <div class="form-group">
                <label>Street Address *</label>
                <input type="text" id="address" maxlength="255" required placeholder="e.g., 345 Thames St">
            </div>

            <div class="form-group">
                <label>Assigned Region/City *</label>
                <select id="locationid" required>
                    <option value="">-- Loading Registered Locations --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Assign Business Categories *</label>
                <div id="categoryCheckboxes" class="checkbox-group">Loading registered categories...</div>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" maxlength="20" placeholder="(401) 555-0199">
            </div>
            <div class="form-group">
                <label>Website URL</label>
                <input type="url" id="website" maxlength="255" placeholder="https://www.example.com">
            </div>

            <div class="form-group">
                <label>Subscription Tier</label>
                <select id="subscription_tier">
                    <option value="Basic">Basic</option>
                    <option value="Premium">Premium</option>
                </select>
            </div>

            <button type="submit">Save Business Storefront</button>
        </form>

        <div id="msgBox" class="message"></div>
        <div class="nav-links">
            <a href="index.html">← Dashboard</a>
            <a href="deals.html">→ Deal Management</a>
        </div>
    </div>

    <script src="../config.js"></script>
    <script>
        async function loadFormAssets() {
            try {
                const locRes = await fetch(`${API_URL}/locations`);
                const locations = await locRes.json();
                const dropdown = document.getElementById('locationid');
                dropdown.innerHTML = '<option value="">-- Select a Location --</option>';
                locations.forEach(loc => {
                    const opt = document.createElement('option');
                    opt.value = loc.locationid;
                    opt.innerText = `${loc.city}, ${loc.state}`;
                    dropdown.appendChild(opt);
                });

                const catRes = await fetch(`${API_URL}/categories/lookup`);
                const categories = await catRes.json();
                const catContainer = document.getElementById('categoryCheckboxes');
                catContainer.innerHTML = '';
                categories.forEach(cat => {
                    const wrap = document.createElement('div');
                    wrap.className = 'checkbox-item';
                    wrap.innerHTML = `<input type="checkbox" name="categories" value="${cat.categoryid}" id="cat_${cat.categoryid}">
                                      <label for="cat_${cat.categoryid}"> ${cat.categoryname}</label>`;
                    catContainer.appendChild(wrap);
                });

            } catch (err) {
                console.error("Could not fetch form configuration lists.", err);
                document.getElementById('locationid').innerHTML = '<option value="">Error loading regions</option>';
                document.getElementById('categoryCheckboxes').innerText = 'Error loading categories';
            }
        }

        document.getElementById('businessForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('msgBox');
            msgBox.style.display = 'none';

            const nameValue = document.getElementById('name').value.trim();
            const locationValue = document.getElementById('locationid').value;
            const checkedCats = document.querySelectorAll('input[name="categories"]:checked');
            const categoryIds = Array.from(checkedCats).map(cb => parseInt(cb.value));

            if (!nameValue || !locationValue || categoryIds.length === 0) {
                msgBox.style.cssText = 'display:block; background:#f8d7da; color:#721c24; border:1px solid #f5c6cb;';
                msgBox.innerText = "Name, Street Address, City Region, and at least one Category are required.";
                return;
            }

            const payload = {
                name: nameValue,
                address: document.getElementById('address').value.trim(),
                locationid: parseInt(locationValue),
                phone: document.getElementById('phone').value.trim() || null,
                website: document.getElementById('website').value.trim() || null,
                subscription_tier: document.getElementById('subscription_tier').value,
                categoryIds: categoryIds
            };

            try {
                const response = await fetch(`${API_URL}/businesses`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (response.ok) {
                    msgBox.style.cssText = 'display:block; background:#d4edda; color:#155724; border:1px solid #c3e6cb;';
                    msgBox.innerText = data.message;
                    document.getElementById('businessForm').reset();
                    loadFormAssets();
                } else {
                    throw new Error(data.error || 'Server error saving storefront.');
                }
            } catch (err) {
                msgBox.style.cssText = 'display:block; background:#f8d7da; color:#721c24; border:1px solid #f5c6cb;';
                msgBox.innerText = err.message;
            }
        });

        loadFormAssets();
    </script>
</body>
</html>
