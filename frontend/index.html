<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Destination Deals</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── Nav bar ── -->
<nav class="consumer-nav" id="consumerNav">
    <a href="index.html" class="nav-logo" onclick="resetHome(event)">
        <img src="images/default_logo.png" alt="Destination Deals" class="nav-logo-img">
    </a>
    <div class="nav-links">
        <a href="index.html" class="nav-link active" onclick="resetHome(event)">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
    </div>
</nav>

<div class="container">

    <!-- Hero -->
    <div class="hero">
        <img
            src="images/default_logo.png"
            alt="Destination Deals"
            class="hero-logo-img"
            onclick="resetHome()"
            style="cursor:pointer;">
        <p class="tagline">
            Select a location below to discover local deals near you.<br>
            <span style="font-size:0.88rem; color:#adb5bd;">Visiting a new area? Scan a local QR code to load deals instantly.</span>
        </p>
    </div>

    <!-- Location permission banner -->
    <div class="location-banner" id="locationBanner">
        <span class="location-banner-icon">📍</span>
        <div class="location-banner-text">
            <strong>See deals closest to you</strong>
            <span>Allow location access to automatically sort deals by distance from where you are.</span>
        </div>
        <button class="location-allow-btn" id="allowLocationBtn">Allow</button>
        <button class="location-dismiss-btn" id="dismissLocationBtn">Not now</button>
    </div>

    <!-- Filters -->
    <div class="filters" id="filtersBar">
        <div class="filter-group">
            <label>Location</label>
            <select id="locationSelect">
                <option value="">Select a Location</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Category</label>
            <select id="categorySelect">
                <option value="">Any Category</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Day</label>
            <select id="daySelect">
                <option value="">Any Day</option>
                <option>Sunday</option>
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
                <option>Saturday</option>
            </select>
        </div>
        <div class="filter-group search-group">
            <label>Search</label>
            <input
                type="text"
                id="searchInput"
                placeholder="Business or deal name..."
                autocomplete="off">
            <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
        </div>
        <div class="filter-group sort-group">
            <label>Sort by</label>
            <select id="sortSelect">
                <option value="default">Featured</option>
                <option value="nearest">Closest to Me</option>
            </select>
        </div>
    </div>

    <!-- Result count + filter tags -->
    <div id="resultsHeader" style="display:none;">
        <div class="results-meta">
            <span id="dealCount"></span>
            <div class="filter-tags" id="filterTags"></div>
        </div>
    </div>

    <!-- Deal cards -->
    <div id="results"></div>

</div>

<!-- Back to top button -->
<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    ↑ Top
</button>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
    // ── Back to top ───────────────────────────────────────────
    const backToTop   = document.getElementById('backToTop');
    const filtersBar  = document.getElementById('filtersBar');

    window.addEventListener('scroll', () => {
        const filtersBottom = filtersBar.getBoundingClientRect().bottom;
        backToTop.classList.toggle('visible', filtersBottom < 0);
    });

    // ── Logo / home reset ─────────────────────────────────────
    function resetHome(e) {
        if (e) e.preventDefault();
        // Reset all filters
        document.getElementById('locationSelect').value = '';
        document.getElementById('categorySelect').value = '';
        document.getElementById('daySelect').value      = '';
        document.getElementById('searchInput').value    = '';
        document.getElementById('sortSelect').value     = 'default';
        // Reset background to default
        document.body.style.backgroundImage =
            `linear-gradient(rgba(255,255,255,.72), rgba(255,255,255,.72)), url('images/default_background.png')`;
        // Trigger welcome state in app.js
        if (typeof showWelcomeState === 'function') showWelcomeState();
    }
</script>
</body>
</html>
