<head>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Destination Deals</title>

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

    <div class="container">

    <div class="hero">

        <h1 class="logo-text">
            Destination Deals
        </h1>

        <p class="tagline">
            Discover local savings,
            activities,
            shopping,
            and dining.
        </p>

    </div>

    <div class="filters">

        <div>
            <label>Location</label>
            <select id="locationSelect">
                <option value="">Select a Location</option>
            </select>
        </div>

        <div>
            <label>Category</label>

            <select id="categorySelect">

                <option value="">
                     Any Category
                </option>

            </select>
        </div>

        <div>
            <label>Day</label>

            <select id="daySelect">

                <option value="">
                    Any Day
                </option>

                <option>Sunday</option>
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
                <option>Saturday</option>

            </select>

        </div>

        <button id="searchBtn" disabled>
            Search
        </button>

    </div>

    <hr>

    <div id="results">

        <div class="welcome-card">

            <p>
                Select a location and click Search to view local deals.
            </p>

        </div>

    </div>


    <script src="config.js"></script>
    <script src="app.js"></script>

    </div>


</body>

</html>
