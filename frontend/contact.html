<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light">
    <title>Contact — Destination Deals</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .contact-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            padding: 40px;
            max-width: 580px;
            margin: 40px auto;
        }
        .contact-card h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .contact-card .subtitle {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #495057;
            margin-bottom: 6px;
        }
        .form-group label .req { color: #e74c3c; margin-left: 2px; }
        .form-group select,
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: #333;
            background: white;
            box-sizing: border-box;
            -webkit-appearance: none;
        }
        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #80bdff;
            outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,.18);
        }
        .form-group textarea { resize: vertical; min-height: 130px; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .extra-fields { display: none; }
        .extra-fields.visible { display: block; }
        .submit-btn {
            width: 100%;
            padding: 13px;
            background: #2c6db2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        .submit-btn:hover { background: #0056b3; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .form-msg {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            line-height: 1.5;
        }
        .form-msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .form-msg.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        @media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<div id="bgLayer"></div>
<div id="bgOverlay"></div>

<nav class="consumer-nav">
    <a href="index.html" class="nav-logo">
        <img src="images/default_logo.png" alt="Destination Deals" class="nav-logo-img">
    </a>
    <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link active">Contact</a>
        <a href="privacy.html" class="nav-link" style="font-size:12px;color:#adb5bd;">Privacy</a>
    </div>
</nav>

<div class="container">
    <div class="contact-card">

        <h1 id="formTitle">Get in Touch</h1>
        <p class="subtitle" id="formSubtitle">Questions, suggestions, or bugs — we read everything.</p>

        <div class="form-group">
            <label>Inquiry Type <span class="req">*</span></label>
            <select id="inquiryType" required onchange="handleTypeChange()">
                <option value="">— Select a topic —</option>
                <option value="!!BUSINESS LISTING REQUEST!!">I Want My Business on the Platform</option>
                <option value="!!INVESTOR INQUIRY!!">Investor Inquiry</option>
                <option value="Bug Report">Bug Report</option>
                <option value="Improvement Suggestion">Improvement Suggestion</option>
                <option value="General Question">General Question / Inquiry</option>
            </select>
        </div>

        <!-- Standard fields -->
        <div class="form-group">
            <label>Your Email <span class="req">*</span></label>
            <input type="email" id="replyEmail" required placeholder="you@example.com">
        </div>

        <!-- Extra fields for investor + business inquiries -->
        <div class="extra-fields" id="extraFields">
            <div class="two-col">
                <div class="form-group">
                    <label>Your Name <span class="req">*</span></label>
                    <input type="text" id="contactName" placeholder="Full name">
                </div>
                <div class="form-group">
                    <label>Phone Number <span class="req">*</span></label>
                    <input type="tel" id="contactPhone" placeholder="(401) 555-0100">
                </div>
            </div>
            <div class="form-group" id="orgFieldWrap">
                <label id="orgLabel">Organization / Firm</label>
                <input type="text" id="contactOrg" placeholder="e.g. Newport Capital Group">
            </div>
            <div class="form-group" id="bizFieldWrap" style="display:none;">
                <label>Business Name <span class="req">*</span></label>
                <input type="text" id="contactBiz" placeholder="e.g. The Black Pearl Restaurant">
            </div>
            <div class="form-group" id="bizLocWrap" style="display:none;">
                <label>Your City / Location <span class="req">*</span></label>
                <select id="contactLoc">
                    <option value="">-- Select your city --</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Message <span class="req">*</span></label>
            <textarea id="messageBody" required
                placeholder="What do you like or dislike about this? How can we improve? What would you like to see added to our platform? Tell us anything."></textarea>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="sendMessage()">
            Send Message
        </button>

        <div class="form-msg" id="formMsg"></div>

    </div>
</div>

<script>
    // ── EmailJS credentials ───────────────────────────────────
    const EMAILJS_PUBLIC_KEY  = 'X53TiSsWCS4oQ-oYT';
    const EMAILJS_SERVICE_ID  = 'service_466bksr';
    const EMAILJS_TEMPLATE_ID = 'template_jb81jcu';

    emailjs.init(EMAILJS_PUBLIC_KEY);

    // ── Pre-fill from URL params ──────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const typeParam = params.get('type');

    if (typeParam === 'investor') {
        document.getElementById('inquiryType').value = '!!INVESTOR INQUIRY!!';
        handleTypeChange();
    } else if (typeParam === 'business') {
        document.getElementById('inquiryType').value = '!!BUSINESS LISTING REQUEST!!';
        handleTypeChange();
    }

    // ── Show/hide extra fields based on inquiry type ──────────
    function handleTypeChange() {
        const type      = document.getElementById('inquiryType').value;
        const extra     = document.getElementById('extraFields');
        const orgWrap   = document.getElementById('orgFieldWrap');
        const bizWrap   = document.getElementById('bizFieldWrap');
        const title     = document.getElementById('formTitle');
        const subtitle  = document.getElementById('formSubtitle');
        const msgBox    = document.getElementById('messageBody');

        const isInvestor = type === '!!INVESTOR INQUIRY!!';
        const isBusiness = type === '!!BUSINESS LISTING REQUEST!!';

        if (isInvestor || isBusiness) {
            extra.classList.add('visible');
        } else {
            extra.classList.remove('visible');
        }

        if (isInvestor) {
            title.textContent    = 'Investor Inquiry';
            subtitle.textContent = 'Tell us about yourself and your interest in Destination Deals.';
            orgWrap.style.display = 'block';
            bizWrap.style.display = 'none';
            document.getElementById('bizLocWrap').style.display = 'none';
            document.getElementById('orgLabel').textContent = 'Organization / Firm';
            msgBox.placeholder = 'Tell us about your background, investment interest, and what excites you about our mission.';
        } else if (isBusiness) {
            title.textContent    = 'Join Our Platform';
            subtitle.textContent = 'Get your business listed and start reaching more customers today.';
            orgWrap.style.display = 'none';
            bizWrap.style.display = 'block';
            document.getElementById('bizLocWrap').style.display = 'block';
            msgBox.placeholder = 'Tell us about your business, what deals you\'d like to offer, and the best time to reach you.';
        } else {
            title.textContent    = 'Get in Touch';
            subtitle.textContent = 'Questions, suggestions, or bugs — we read everything.';
            orgWrap.style.display = 'block';
            bizWrap.style.display = 'none';
            document.getElementById('bizLocWrap').style.display = 'none';
            msgBox.placeholder = 'What do you like or dislike about this? How can we improve? What would you like to see added?';
        }
    }

    // ── Send message ──────────────────────────────────────────
    async function sendMessage() {
        const type    = document.getElementById('inquiryType').value;
        const email   = document.getElementById('replyEmail').value.trim();
        const message = document.getElementById('messageBody').value.trim();
        const btn     = document.getElementById('submitBtn');
        const msg     = document.getElementById('formMsg');

        msg.style.display = 'none';

        const isInvestor = type === '!!INVESTOR INQUIRY!!';
        const isBusiness = type === '!!BUSINESS LISTING REQUEST!!';
        const needsExtra = isInvestor || isBusiness;

        if (!type)    { showFormMsg('Please select an inquiry type.', 'error'); return; }
        if (!email)   { showFormMsg('Please enter your email address.', 'error'); return; }
        if (!message) { showFormMsg('Please enter a message.', 'error'); return; }

        if (needsExtra) {
            const name  = document.getElementById('contactName').value.trim();
            const phone = document.getElementById('contactPhone').value.trim();
            if (!name)  { showFormMsg('Please enter your name.', 'error'); return; }
            if (!phone) { showFormMsg('Please enter your phone number.', 'error'); return; }
            if (isBusiness) {
                const biz = document.getElementById('contactBiz').value.trim();
                if (!biz) { showFormMsg('Please enter your business name.', 'error'); return; }
            }
        }

        btn.disabled    = true;
        btn.textContent = 'Sending...';

        // Build full message with extra fields
        let fullMessage = message;
        if (needsExtra) {
            const name  = document.getElementById('contactName').value.trim();
            const phone = document.getElementById('contactPhone').value.trim();
            const org   = document.getElementById('contactOrg')?.value.trim() || '';
            const biz   = document.getElementById('contactBiz')?.value.trim() || '';
            fullMessage = `Name: ${name}\nPhone: ${phone}` +
                (org ? `\nOrganization: ${org}` : '') +
                (biz ? `\nBusiness: ${biz}` : '') +
                `\n\n${message}`;
        }

        try {
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                from_type: type,
                message:   fullMessage,
                reply_to:  email,
            });

            const thankYou = isInvestor
                ? 'Thank you for your interest in contributing to our growth and helping your local businesses grow. We will be in contact with you as soon as possible.'
                : isBusiness
                    ? 'Thank you for your interest in joining Destination Deals! We will be in contact with you shortly to get your business listed.'
                    : 'Message sent — thank you! We\'ll be in touch if you left an email.';

            showFormMsg(thankYou, 'success');

            // Reset form
            document.getElementById('inquiryType').value = '';
            document.getElementById('replyEmail').value  = '';
            document.getElementById('messageBody').value = '';
            document.getElementById('contactName').value = '';
            document.getElementById('contactPhone').value= '';
            document.getElementById('contactOrg').value  = '';
            document.getElementById('contactBiz').value  = '';
            document.getElementById('extraFields').classList.remove('visible');
            document.getElementById('formTitle').textContent    = 'Get in Touch';
            document.getElementById('formSubtitle').textContent = 'Questions, suggestions, or bugs — we read everything.';

        } catch (err) {
            console.error('EmailJS error:', err);
            showFormMsg('Something went wrong. Please try again.', 'error');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Send Message';
        }
    }

    // Load platform locations into business inquiry dropdown
    async function loadContactLocations() {
        try {
            // Use config.js API_URL if available, otherwise detect
            const base = typeof API_URL !== 'undefined' ? API_URL
                : (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                    ? 'http://localhost:3000'
                    : 'https://destination-deals.onrender.com');
            const res  = await fetch(`${base}/locations`);
            const locs = await res.json();
            const sel  = document.getElementById('contactLoc');
            locs.forEach(l => {
                const opt = document.createElement('option');
                opt.value = `${l.city}, ${l.state}`;
                opt.textContent = `${l.city}, ${l.state}`;
                sel.appendChild(opt);
            });
        } catch(e) { console.warn('Could not load locations'); }
    }
    loadContactLocations();

    function showFormMsg(text, type) {
        const el = document.getElementById('formMsg');
        el.textContent   = text;
        el.className     = `form-msg ${type}`;
        el.style.display = 'block';
    }
</script>
</body>
</html>
