<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Contact — Destination Deals</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .contact-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            padding: 40px;
            max-width: 580px;
            margin: 40px auto;
        }
        .contact-card h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .contact-card .subtitle {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #495057;
            margin-bottom: 6px;
        }
        .form-group select,
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: #333;
            background: white;
            box-sizing: border-box;
            appearance: none;
            -webkit-appearance: none;
        }
        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #80bdff;
            outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,.18);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 140px;
        }
        .submit-btn {
            width: 100%;
            padding: 13px;
            background: #2c6db2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        .submit-btn:hover { background: #0056b3; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .form-msg {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }
        .form-msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .form-msg.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Setup notice for EmailJS */
        .setup-notice {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 13px;
            color: #856404;
            margin-bottom: 24px;
            display: none; /* hidden in production — see comment below */
        }
    </style>

    <!--
    ══════════════════════════════════════════════════════════
    EmailJS SETUP (one-time, ~5 minutes):

    1. Go to https://www.emailjs.com and create a free account
    2. Add an Email Service → connect your Gmail
    3. Create an Email Template with these variables:
           {{from_type}}   — inquiry type
           {{message}}     — user message
           {{reply_to}}    — user email (optional)
       Subject line suggestion: "Destination Deals — {{from_type}}"
    4. Copy your Public Key, Service ID, and Template ID
    5. Replace the three placeholder values below
    ══════════════════════════════════════════════════════════
    -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<nav class="consumer-nav">
    <a href="index.html" class="nav-logo">
        <img src="images/default_logo.png" alt="Destination Deals" class="nav-logo-img">
    </a>
    <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link active">Contact</a>
    </div>
</nav>

<div class="container">
    <div class="contact-card">

        <h1>Get in Touch</h1>
        <p class="subtitle">Questions, suggestions, or bugs — we read everything.</p>

        <div class="form-group">
            <label>Inquiry Type *</label>
            <select id="inquiryType" required>
                <option value="">— Select a topic —</option>
                <option value="Bug Report">Bug Report</option>
                <option value="Improvement Suggestion">Improvement Suggestion</option>
                <option value="General Question">General Question / Inquiry</option>
                <option value="Business Partnership">Business Partnership</option>
            </select>
        </div>

        <div class="form-group">
            <label>Your Email (optional — include if you'd like a reply)</label>
            <input type="email" id="replyEmail" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label>Message *</label>
            <textarea
                id="messageBody"
                placeholder="What do you like or dislike about this? How can we improve? What would you like to see added to our platform? Tell us anything."
                required></textarea>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="sendMessage()">
            Send Message
        </button>

        <div class="form-msg" id="formMsg"></div>

    </div>
</div>

<script>
    // ── EmailJS credentials — replace with your real values ──
    const EMAILJS_PUBLIC_KEY  = 'X53TiSsWCS4oQ-oYT';
    const EMAILJS_SERVICE_ID  = 'service_466bksr';
    const EMAILJS_TEMPLATE_ID = 'template_jb81jcu';

    emailjs.init(EMAILJS_PUBLIC_KEY);

    async function sendMessage() {
        const type    = document.getElementById('inquiryType').value;
        const email   = document.getElementById('replyEmail').value.trim();
        const message = document.getElementById('messageBody').value.trim();
        const btn     = document.getElementById('submitBtn');
        const msg     = document.getElementById('formMsg');

        msg.style.display = 'none';

        if (!type) {
            showFormMsg('Please select an inquiry type.', 'error');
            return;
        }
        if (!message) {
            showFormMsg('Please enter a message before sending.', 'error');
            return;
        }

        btn.disabled     = true;
        btn.textContent  = 'Sending...';

        try {
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                from_type: type,
                message:   message,
                reply_to:  email || 'No email provided',
            });

            showFormMsg('Message sent — thank you! We\'ll be in touch if you left an email.', 'success');
            document.getElementById('inquiryType').value  = '';
            document.getElementById('replyEmail').value   = '';
            document.getElementById('messageBody').value  = '';

        } catch (err) {
            console.error('EmailJS error:', err);
            showFormMsg('Something went wrong. Please try again or email us directly.', 'error');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Send Message';
        }
    }

    function showFormMsg(text, type) {
        const el = document.getElementById('formMsg');
        el.textContent   = text;
        el.className     = `form-msg ${type}`;
        el.style.display = 'block';
    }
</script>

</body>
</html>
